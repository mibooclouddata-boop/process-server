<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공정 추적 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#1a5fb4;--teal-light:#e8f0fb;
  --in:#00967a;--stamp:#8e44ad;--assembly:#2980b9;--out:#e67e22;
  --bg:#f0f2f7;--card:#fff;--border:#e4e6ee;--text:#1a1a2e;--text2:#7a7a9a;
  --radius:14px;--shadow:0 2px 12px rgba(30,40,80,0.07);
}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── 로그인 ── */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:#f0f2f7}
.login-box{background:var(--card);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(26,95,180,0.10);border:1px solid var(--border)}
.login-logo{text-align:center;margin-bottom:0}
.field-wrap{margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;color:#888;margin-bottom:7px;display:block;letter-spacing:.3px}
.field-input{width:100%;padding:14px 16px;border:1.5px solid #e4e6ee;border-radius:12px;font-size:15px;color:var(--text);background:#f8f9fd;outline:none;transition:border-color .2s;font-family:inherit}
.field-input:focus{border-color:var(--teal);background:#fff}
.login-btn{width:100%;padding:16px;border-radius:12px;border:none;background:#00b894;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:20px;letter-spacing:.3px;transition:opacity .15s;font-family:inherit}
.login-btn:hover{opacity:.9}
.login-error{color:#c0392b;font-size:13px;text-align:center;margin-top:12px;display:none;background:#fdf0ec;padding:10px;border-radius:8px}

/* ── 탑바 ── */
#dashboard{display:none}
.topbar{background:var(--teal);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;box-shadow:0 2px 8px rgba(26,95,180,0.15)}
.topbar-logo{height:28px;width:auto;filter:brightness(0) invert(1);display:block}
.topbar-title{font-size:14px;font-weight:700;flex:1;color:rgba(255,255,255,0.85);margin-left:4px}
.topbar-user{font-size:13px;color:rgba(255,255,255,0.75)}
.logout-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);cursor:pointer;font-size:12px;color:#fff;transition:background .15s}
.logout-btn:hover{background:rgba(255,255,255,0.25)}

/* ── 메인 ── */
.main{padding:24px;max-width:1200px;margin:0 auto}

/* 통계 */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;border:1px solid var(--border);text-align:center;box-shadow:var(--shadow);transition:transform .15s}
.stat-card:hover{transform:translateY(-2px)}
.stat-label{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:30px;font-weight:800;line-height:1}

/* 탭 */
.tabs{display:flex;gap:0;margin-bottom:20px;background:var(--card);border-radius:12px;padding:4px;border:1px solid var(--border);width:fit-content;box-shadow:var(--shadow)}
.tab{padding:8px 22px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text2);font-weight:600;border-radius:9px;transition:all .15s}
.tab.on{background:var(--teal);color:#fff;box-shadow:0 2px 8px rgba(26,95,180,0.2)}

/* 검색 */
.search-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--card);outline:none;transition:border-color .2s;box-shadow:var(--shadow);font-family:inherit}
.search-textarea{resize:vertical;min-height:80px;line-height:1.6;font-family:'Noto Sans KR',monospace}
.search-input:focus{border-color:var(--teal)}
.filter-select{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--card);outline:none;box-shadow:var(--shadow)}

/* 카드/테이블 */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:#f8f9fd}
td{padding:13px 16px;border-bottom:1px solid #f0f2f7;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8f9fd}

/* 공정 배지 */
.step-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.step-in      {background:#e0f5ef;color:#007a5e}
.step-stamp   {background:#f3e8fb;color:#6c3483}
.step-assembly{background:#e3f0fb;color:#1a5276}
.step-out     {background:#fef0e3;color:#b96a0a}

/* 진행 바 */
.progress-wrap{display:flex;gap:5px;align-items:center}
.progress-step{width:36px;height:7px;border-radius:4px;background:#eaecf4}
.progress-step.done-in      {background:var(--in)}
.progress-step.done-stamp   {background:var(--stamp)}
.progress-step.done-assembly{background:var(--assembly)}
.progress-step.done-out     {background:var(--out)}

/* 상세 이력 */
.detail-row td{padding:0;background:#f8f9fd}
.detail-inner{padding:14px 16px 16px 52px}
.detail-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.step-list{display:flex;flex-direction:column;gap:7px}
.step-item{display:flex;align-items:center;gap:10px;font-size:12px}
.step-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.step-dot-in      {background:var(--in)}
.step-dot-stamp   {background:var(--stamp)}
.step-dot-assembly{background:var(--assembly)}
.step-dot-out     {background:var(--out)}
.step-time{color:var(--text2)}
.step-user{font-weight:700;color:var(--text)}

/* 빈 상태 */
.empty{padding:60px;text-align:center;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* 새로고침 표시 */
.refresh-bar{font-size:11px;color:var(--text2);text-align:right;padding:0 0 10px;opacity:.7}

@media(max-width:600px){.main{padding:14px}.stats-row{grid-template-columns:repeat(2,1fr)}.topbar{padding:0 14px}}
</style>
</head>

          <option value="stamp">도장</option>
          <option value="assembly">조립</option>
          <option value="out">출고</option>
        </select>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th></th>
                <th>자재코드</th>
                <th>제품명</th>
                <th>현재 공정</th>
                <th>진행 현황</th>
                <th>최근 업데이트</th>
              </tr>
            </thead>
            <tbody id="trackingBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 전체 기록 탭 -->
    <div id="tabRecords" style="display:none">
      <div class="search-row">
        <textarea class="search-input search-textarea" id="recSearch" placeholder="자재코드 입력 (여러 개는 줄바꿈으로 구분)&#10;SN2700B7TL0100104&#10;..." oninput="loadRecords()" rows="3"></textarea>
        <select class="filter-select" id="recFilter" onchange="loadRecords()">
          <option value="">전체 유형</option>
          <option value="in">입고</option>
          <option value="stamp">도장</option>
          <option value="assembly">조립</option>
          <option value="out">출고</option>
        </select>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>시각</th>
                <th>자재코드</th>
                <th>제품명</th>
                <th>공정</th>
                <th>수량</th>
                <th>담당자</th>
              </tr>
            </thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 설정 ──
const SERVER = window.location.origin; // 같은 서버에서 서빙되므로 자동
let currentUser = null;
let expandedBarcodes = new Set();

const TYPE_INFO = {
  in:       { label:'입고',  cls:'step-in',       dot:'step-dot-in',       prog:'done-in' },
  stamp:    { label:'도장',  cls:'step-stamp',     dot:'step-dot-stamp',    prog:'done-stamp' },
  assembly: { label:'조립',  cls:'step-assembly',  dot:'step-dot-assembly', prog:'done-assembly' },
  out:      { label:'출고',  cls:'step-out',       dot:'step-dot-out',      prog:'done-out' },
};
const STEP_ORDER = ['in','stamp','assembly','out'];

// ── 로그인 ──
async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!id || !pw) { errEl.textContent = '아이디와 비밀번호를 입력하세요.'; errEl.style.display = 'block'; return; }
  try {
    const r = await fetch(`${SERVER}/api/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id, password: pw })
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || '로그인 실패'; errEl.style.display = 'block'; return; }
    currentUser = data.user;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('topbarUser').textContent = `${data.user.name} (${data.user.id})`;
    loadStats(); loadTracking();
  } catch(e) {
    errEl.textContent = '서버에 연결할 수 없습니다.'; errEl.style.display = 'block';
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

// ── 탭 전환 ──
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tabTracking').style.display = tab === 'tracking' ? 'block' : 'none';
  document.getElementById('tabRecords').style.display  = tab === 'records'  ? 'block' : 'none';
  if (tab === 'records') loadRecords();
}

// ── 통계 ──
async function loadStats() {
  try {
    const r = await fetch(`${SERVER}/api/records`);
    const data = await r.json();
    const records = data.records || [];
    const counts = { total: records.length, in:0, stamp:0, assembly:0, out:0 };
    records.forEach(r => { if (counts[r.type] !== undefined) counts[r.type]++; });
    document.getElementById('statsRow').innerHTML = [
      { label:'전체 기록', val: counts.total, color:'#1a1a18' },
      { label:'입고',      val: counts.in,    color:'#00967a' },
      { label:'도장',      val: counts.stamp, color:'#8e44ad' },
      { label:'조립',      val: counts.assembly, color:'#2980b9' },
      { label:'출고',      val: counts.out,   color:'#e67e22' },
    ].map(s => `
      <div class="stat-card">
        <div class="stat-label">${s.label}</div>
        <div class="stat-val" style="color:${s.color}">${s.val}</div>
      </div>
    `).join('');
  } catch(e) {}
}

// ── 공정 추적 ──
async function loadTracking() {
  const raw = document.getElementById('trackSearch').value;
  const codes = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  const filter = document.getElementById('trackFilter').value;
  try {
    const r = await fetch(`${SERVER}/api/tracking`);
    const data = await r.json();
    let items = data.tracking || [];
    if (codes.length > 0) {
      items = items.filter(i => codes.some(c => i.barcode.includes(c)));
    }
    if (filter) items = items.filter(i => i.currentStep === filter);

    const tbody = document.getElementById('trackingBody');
    const countEl = document.getElementById('trackCount');
    if (countEl) countEl.textContent = codes.length > 0 ? `${codes.length}개 코드 검색 → ${items.length}건 매칭` : `전체 ${items.length}건`;
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">📋</div><p>${codes.length>0?'검색 결과가 없습니다':'데이터가 없습니다'}</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = items.map(item => {
      const t = TYPE_INFO[item.currentStep] || { label:'미상', cls:'', prog:'' };
      const isExpanded = expandedBarcodes.has(item.barcode);

      // 진행 바
      const progressBar = STEP_ORDER.map(step => {
        const done = item.steps.some(s => s.type === step);
        const cls = done ? `progress-step ${TYPE_INFO[step].prog}` : 'progress-step';
        return `<div class="${cls}" title="${TYPE_INFO[step].label}"></div>`;
      }).join('');

      // 마지막 업데이트 시각
      const lastStep = item.steps[item.steps.length - 1];
      const lastTime = lastStep ? (lastStep.time || lastStep.receivedAt?.substring(0,16).replace('T',' ') || '-') : '-';

      // 상세 이력
      const detailHtml = isExpanded ? `
        <tr class="detail-row">
          <td colspan="6">
            <div class="detail-inner">
              <div class="detail-title">공정 이력 (${item.steps.length}건)</div>
              <div class="step-list">
                ${item.steps.map(s => {
                  const si = TYPE_INFO[s.type] || { label:s.type, dot:'' };
                  const t = s.time || s.receivedAt?.substring(0,16).replace('T',' ') || '-';
                  return `<div class="step-item">
                    <div class="step-dot ${si.dot}"></div>
                    <span class="step-badge ${si.cls}">${si.label}</span>
                    <span class="step-user">${s.userName || s.userId}</span>
                    <span class="step-time">${t}</span>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </td>
        </tr>` : '';

      return `
        <tr style="cursor:pointer" onclick="toggleDetail('${item.barcode}')">
          <td style="color:#bbb;font-size:16px">${isExpanded ? '▾' : '▸'}</td>
          <td><code style="font-size:12px;font-weight:700">${item.barcode}</code></td>
          <td style="color:#888;font-size:12px">${item.name || '-'}</td>
          <td><span class="step-badge ${t.cls}">${t.label}</span></td>
          <td><div class="progress-wrap">${progressBar}</div></td>
          <td style="color:#888;font-size:12px">${lastTime}</td>
        </tr>
        ${detailHtml}
      `;
    }).join('');
  } catch(e) {
    document.getElementById('trackingBody').innerHTML = `<tr><td colspan="6" style="padding:20px;color:#c0392b;text-align:center">서버 연결 오류</td></tr>`;
  }
}

function toggleDetail(barcode) {
  if (expandedBarcodes.has(barcode)) expandedBarcodes.delete(barcode);
  else expandedBarcodes.add(barcode);
  loadTracking();
}

// ── 전체 기록 ──
async function loadRecords() {
  const raw = document.getElementById('recSearch').value;
  const codes = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  const filter = document.getElementById('recFilter').value;
  const params = new URLSearchParams();
  if (filter) params.set('type', filter);
  try {
    const r = await fetch(`${SERVER}/api/records?${params}`);
    const data = await r.json();
    let records = data.records || [];
    if (codes.length > 0) {
      records = records.filter(r => codes.some(c => r.barcode.includes(c)));
    }
    const tbody = document.getElementById('recordsBody');
    if (!records.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">📋</div><p>기록이 없습니다</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = records.map(r => {
      const t = TYPE_INFO[r.type] || { label:r.type, cls:'' };
      const time = r.time || r.receivedAt?.substring(0,16).replace('T',' ') || '-';
      return `<tr>
        <td style="color:#888;font-size:12px">${time}</td>
        <td><code style="font-size:12px;font-weight:700">${r.barcode}</code></td>
        <td style="font-size:12px;color:#888">${r.name || '-'}</td>
        <td><span class="step-badge ${t.cls}">${t.label}</span></td>
        <td style="font-size:13px;font-weight:700">${r.qty}개</td>
        <td style="font-size:12px;font-weight:600">${r.userName || r.userId || '-'}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    document.getElementById('recordsBody').innerHTML = `<tr><td colspan="6" style="padding:20px;color:#c0392b;text-align:center">서버 연결 오류</td></tr>`;
  }
}

// 30초마다 자동 새로고침
let refreshCount = 30;
function updateRefreshBar() {
  const el = document.getElementById('refreshBar');
  if (el) el.textContent = `자동 새로고침 ${refreshCount}초 후`;
}
setInterval(() => {
  refreshCount--;
  updateRefreshBar();
  if (refreshCount <= 0) {
    refreshCount = 30;
    if (currentUser) {
      loadStats();
      if (document.getElementById('tabTracking').style.display !== 'none') loadTracking();
    }
  }
}, 1000);
</script>
</body>
</html>
